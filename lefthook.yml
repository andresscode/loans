commit-msg:
  commands:
    commitlint:
      run: pnpm dlx commitlint --edit $1

pre-commit:
  commands:
    biome-check:
      run: pnpm check {staged_files}
      stage_fixed: true
      exclude:
        - "*.{md,ico,woff,svg,yml,yaml,toml,sql,html,png}"
        - ".gitignore"
        - ".env.*"

pre-push:
  commands:
    test:
      run: pnpm test
    build:
      run: pnpm build
